<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>W.STUDIO Helper</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0b0d12; color: #e6e8ee; margin: 0; padding: 32px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: .02em; }
  .sub { color: #8b93a7; margin-bottom: 28px; font-size: 13px; }
  .card { background: #141821; border: 1px solid #1f2532; border-radius: 12px;
          padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; justify-content: space-between; align-items: center;
         padding: 6px 0; }
  .row + .row { border-top: 1px solid #1c2230; }
  .k { color: #8b93a7; font-size: 13px; }
  .v { font-family: "SF Mono", Menlo, monospace; font-size: 13px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
         margin-right: 8px; vertical-align: middle; background: #3a4252; }
  .dot.ok { background: #4ade80; box-shadow: 0 0 8px #4ade8088; }
  .dot.bad { background: #f87171; }
  .dot.warn { background: #fbbf24; }
  button { background: #2563eb; border: 0; color: white; padding: 10px 16px;
           border-radius: 8px; font-size: 14px; cursor: pointer; margin-right: 8px; }
  button:hover { background: #1d4ed8; }
  .level-bar { height: 6px; background: #1c2230; border-radius: 3px; overflow: hidden;
               width: 140px; }
  .level-bar > div { height: 100%; background: linear-gradient(90deg,#4ade80,#fbbf24,#f87171);
                     transition: width .1s; }
  code { background: #1c2230; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>W.STUDIO Helper</h1>
  <div class="sub">Local bridge — <code>http://127.0.0.1:48000</code></div>

  <div class="card">
    <div class="row"><span class="k">Helper</span>
      <span class="v"><span id="helper-dot" class="dot"></span><span id="helper-state">…</span></span></div>
    <div class="row"><span class="k">Version</span><span class="v" id="version">—</span></div>
    <div class="row"><span class="k">CoreAudio driver installed</span><span class="v" id="driver">—</span></div>
  </div>

  <div class="card">
    <div class="row"><span class="k">Slot 1 — artist audio</span>
      <span class="v"><span id="slot-dot" class="dot"></span><span id="slot-state">idle</span></span></div>
    <div class="row"><span class="k">Level</span>
      <span class="v"><div class="level-bar"><div id="level-fill" style="width:0%"></div></div></span></div>
    <div class="row"><span class="k">Packets received</span><span class="v" id="pkts">0</span></div>
    <div class="row"><span class="k">Packets failed</span><span class="v" id="failed">0</span></div>
    <div class="row"><span class="k">Sample rate / channels</span><span class="v" id="srch">—</span></div>
  </div>

  <div class="card">
    <div class="row"><span class="k">DAW plugin</span>
      <span class="v"><span id="plugin-dot" class="dot"></span><span id="plugin-state">not seen</span></span></div>
    <div class="row"><span class="k">Track name</span><span class="v" id="track">—</span></div>
    <div class="row"><span class="k">Last event</span><span class="v" id="lastseen">—</span></div>
  </div>

  <div class="card">
    <button onclick="testTone()">Inject 200ms test tone → Slot 1</button>
    <span id="test-result" style="margin-left:10px;color:#8b93a7;font-size:13px;"></span>
  </div>
</div>

<script>
async function tick() {
  try {
    const r = await fetch('/status', { cache: 'no-store' });
    const j = await r.json();
    document.getElementById('helper-dot').className = 'dot ok';
    document.getElementById('helper-state').textContent = 'running';
    document.getElementById('version').textContent = j.helper?.version ?? '—';
    document.getElementById('driver').textContent = j.device_installed ? 'yes' : 'no (not yet shipped)';

    const s = j.slot_1 || {};
    const sdot = document.getElementById('slot-dot');
    sdot.className = 'dot ' + (s.connected ? 'ok' : 'bad');
    document.getElementById('slot-state').textContent = s.connected ? 'receiving' : 'no audio';
    document.getElementById('level-fill').style.width = Math.min(100, (s.level ?? 0) * 100) + '%';
    document.getElementById('pkts').textContent = s.packets ?? 0;
    document.getElementById('failed').textContent = s.failed ?? 0;
    document.getElementById('srch').textContent = (s.sample_rate ?? '—') + ' Hz / ' + (s.channels ?? '—') + ' ch';

    const p = j.plugin || {};
    const pdot = document.getElementById('plugin-dot');
    pdot.className = 'dot ' + (p.connected ? 'ok' : 'warn');
    document.getElementById('plugin-state').textContent = p.connected ? 'connected' : 'not seen';
    document.getElementById('track').textContent = p.trackName ?? '—';
    document.getElementById('lastseen').textContent = p.lastSeenAt
      ? new Date(p.lastSeenAt).toLocaleTimeString() : '—';
  } catch (e) {
    document.getElementById('helper-dot').className = 'dot bad';
    document.getElementById('helper-state').textContent = 'unreachable';
  }
}
async function testTone() {
  const el = document.getElementById('test-result');
  el.textContent = 'sending…';
  try {
    const r = await fetch('/test-tone', { method: 'POST' });
    const j = await r.json();
    el.textContent = j.ok ? `sent ${j.wrote} samples ✓` : 'failed';
  } catch (e) { el.textContent = 'failed: ' + e.message; }
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
